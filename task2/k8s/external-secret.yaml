apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tenant-db-credentials
  namespace: acme-corp
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager # Assumes a ClusterSecretStore is set up for Workload Identity
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: tenant-acme-corp-credentials
      property: username
  - secretKey: password
    remoteRef:
      key: tenant-acme-corp-credentials
      property: password

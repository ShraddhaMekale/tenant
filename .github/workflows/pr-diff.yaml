name: Kustomize PR Diff

on:
  pull_request:
    paths:
      - 'task1/k8s/**'
      - 'task2/k8s/**'
      - 'task3/**'

jobs:
  kustomize-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v3
        with:
          path: pr-branch

      - name: Checkout Main Branch
        uses: actions/checkout@v3
        with:
          ref: main
          path: main-branch

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Kustomize Build Main
        run: |
          cd main-branch/task3
          # Fallback to an empty file if build fails (e.g., kustomization.yaml missing in main)
          kustomize build . > ../../main.yaml || touch ../../main.yaml

      - name: Kustomize Build PR
        run: |
          cd pr-branch/task3
          kustomize build . > ../../pr.yaml

      - name: Generate Diff
        id: diff
        run: |
          # Use diff but don't fail the step if differences are found (diff exit code 1)
          diff -u main.yaml pr.yaml > kustomize.diff || true
          
          # Prepare the diff for a GitHub comment
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "diff<<$EOF" >> $GITHUB_ENV
          cat kustomize.diff >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Comment PR
        uses: actions/github-script@v6
        if: env.diff != ''
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const diff = process.env.diff;
            const output = `### Kustomize Diff
            <details><summary>Show Diff</summary>

            ```diff
            ${diff}
            ```

            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
